name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci

    - name: Run linting
      run: npm run lint

    - name: Run UI tests
      run: npx vitest run

    - name: Build frontend
      run: npm run build

  smart-contracts-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: wasm32-unknown-unknown

    - name: Run Soroban tests
      run: |
        cargo test --manifest-path contracts/registry-contract/Cargo.toml
        cargo test --manifest-path contracts/license-dao-contract/Cargo.toml
